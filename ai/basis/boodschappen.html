<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boodschappen</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      padding: 32px;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        align-items: flex-start;
      }

      .container {
        border-radius: 0;
        box-shadow: none;
        padding: 20px 16px;
        min-height: 100dvh;
      }

      .input-row {
        flex-wrap: wrap;
      }

      .amount-wrapper input[type="number"] {
        width: 72px;
      }

      .input-row button {
        width: 100%;
      }

      tbody td {
        padding: 14px 4px;
      }
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #1a202c;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: #4a90d9;
    }

    .amount-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .amount-wrapper input[type="number"] {
      width: 64px;
      padding: 10px 20px 10px 8px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .amount-wrapper input[type="number"]:focus {
      border-color: #4a90d9;
    }

    .amount-wrapper input[type="number"]::-webkit-inner-spin-button,
    .amount-wrapper input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }

    .amount-suffix {
      position: absolute;
      right: 8px;
      color: #4a5568;
      font-size: 1rem;
      font-weight: 600;
      pointer-events: none;
      user-select: none;
    }

    .amount-badge {
      font-size: 0.8rem;
      font-weight: 600;
      color: #718096;
      white-space: nowrap;
      padding-right: 8px;
    }

    .amount-badge.done {
      color: #cbd5e0;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #357abd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
      padding-bottom: 8px;
      border-bottom: 1.5px solid #e2e8f0;
    }

    thead th:last-child {
      text-align: right;
    }

    tbody tr {
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f7fafc;
    }

    tbody td {
      padding: 12px 4px;
      vertical-align: middle;
    }

    tbody td:first-child {
      width: 36px;
    }

    tbody td:last-child {
      text-align: right;
      width: 40px;
    }

    .product-name {
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
    }

    .product-name.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    input[type="checkbox"] {
      display: block;
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90d9;
    }

    .delete-button {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-button:hover {
      color: #c53030;
      background: #fff5f5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay.hidden {
      display: none;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      padding: 28px 28px 24px;
      width: 90%;
      max-width: 340px;
    }

    .modal p {
      color: #2d3748;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .button-cancel {
      padding: 8px 16px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .button-cancel:hover {
      background: #357abd;
    }

    .button-delete {
      padding: 8px 16px;
      background: none;
      color: #e53e3e;
      border: 1.5px solid #e53e3e;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .button-delete:hover {
      background: #fff5f5;
      color: #c53030;
      border-color: #c53030;
    }

    .progress-section {
      margin-bottom: 20px;
    }

    .progress-label {
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4a90d9;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-fill.complete {
      background: #38a169;
    }

    .clear-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      text-align: right;
    }

    .button-clear {
      background: none;
      border: none;
      font-size: 0.85rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.2s;
    }

    .button-clear:hover {
      color: #e53e3e;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 6px 14px;
      border: none;
      border-radius: 99px;
      font-size: 0.85rem;
      cursor: pointer;
      background: none;
      color: #718096;
      transition: background 0.15s, color 0.15s;
    }

    .tab:hover {
      background: #f0f4f8;
      color: #2d3748;
    }

    .tab.active {
      background: #ebf4ff;
      color: #2b6cb0;
      font-weight: 600;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div id="confirm-overlay" class="overlay hidden">
    <div class="modal">
      <p>Weet je zeker dat je dit product wilt verwijderen?</p>
      <div class="modal-actions">
        <button class="button-cancel" id="confirm-cancel">Annuleren</button>
        <button class="button-delete" id="confirm-ok">Verwijderen</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>Boodschappen</h1>

    <div class="input-row">
      <input type="text" id="product-input" placeholder="Product toevoegen..." autofocus>
      <div class="amount-wrapper">
        <input type="number" id="amount-input" value="1" min="1">
        <span class="amount-suffix">×</span>
      </div>
      <button onclick="addProduct()">Toevoegen</button>
    </div>

    <div class="progress-section" id="progress-section" style="display:none">
      <div class="progress-label" id="progress-label"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="all">Alles</button>
      <button class="tab" data-tab="todo">Te doen</button>
      <button class="tab" data-tab="done">Gedaan</button>
    </div>

    <table id="product-table">
      <thead>
        <tr>
          <th></th>
          <th>Product</th>
          <th></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="product-list">
        <tr id="empty-row">
          <td colspan="4" class="empty">Nog geen producten toegevoegd.</td>
        </tr>
      </tbody>
    </table>

    <div class="clear-section" id="clear-section" style="display:none">
      <button class="button-clear" onclick="showConfirm(null)">Wis volledige lijst</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('product-input');
    const amountInput = document.getElementById('amount-input');
    const list = document.getElementById('product-list');
    const emptyRow = document.getElementById('empty-row');
    const overlay = document.getElementById('confirm-overlay');
    const confirmOk = document.getElementById('confirm-ok');
    const confirmCancel = document.getElementById('confirm-cancel');
    const modalMessage = overlay.querySelector('.modal p');
    const progressSection = document.getElementById('progress-section');
    const progressLabel = document.getElementById('progress-label');
    const progressFill = document.getElementById('progress-fill');
    const clearSection = document.getElementById('clear-section');

    let items = JSON.parse(localStorage.getItem('boodschappen') || '[]');
    let activeTab = 'all';
    let pendingAction = null;

    document.querySelectorAll('.tab').forEach(button => {
      button.addEventListener('click', () => {
        activeTab = button.dataset.tab;
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === button));
        render();
      });
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addProduct();
    });

    function showConfirm(indexOrNull) {
      if (indexOrNull === null) {
        modalMessage.textContent = 'Weet je zeker dat je de volledige lijst wilt wissen?';
        pendingAction = () => { items = []; save(); render(); };
      } else {
        modalMessage.textContent = 'Weet je zeker dat je dit product wilt verwijderen?';
        pendingAction = () => { items.splice(indexOrNull, 1); save(); render(); };
      }
      overlay.classList.remove('hidden');
    }

    function hideConfirm() {
      pendingAction = null;
      overlay.classList.add('hidden');
    }

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) hideConfirm();
    });

    confirmCancel.addEventListener('click', hideConfirm);

    confirmOk.addEventListener('click', () => {
      if (pendingAction) pendingAction();
      hideConfirm();
    });

    function save() {
      localStorage.setItem('boodschappen', JSON.stringify(items));
    }

    function render() {
      list.querySelectorAll('tr:not(#empty-row)').forEach(tr => tr.remove());

      const visible = items
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => activeTab === 'all' || (activeTab === 'done' ? item.done : !item.done));

      emptyRow.style.display = visible.length === 0 ? '' : 'none';
      visible.forEach(({ item, index }) => list.appendChild(createRow(item, index)));

      const total = items.length;
      const done = items.filter(i => i.done).length;
      progressSection.style.display = total === 0 ? 'none' : '';
      clearSection.style.display = total === 0 ? 'none' : '';
      progressLabel.textContent = `${done} / ${total} gedaan`;
      const pct = total === 0 ? 0 : (done / total) * 100;
      progressFill.style.width = pct + '%';
      progressFill.classList.toggle('complete', total > 0 && done === total);
    }

    function createRow(item, index) {
      const tr = document.createElement('tr');

      const checkTd = document.createElement('td');
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = item.done;
      checkbox.addEventListener('change', () => {
        items[index].done = checkbox.checked;
        nameTd.classList.toggle('done', checkbox.checked);
        amountTd.classList.toggle('done', checkbox.checked);
        save();
        render();
      });
      checkTd.appendChild(checkbox);

      const nameTd = document.createElement('td');
      nameTd.className = 'product-name' + (item.done ? ' done' : '');
      nameTd.textContent = item.name;

      const amountTd = document.createElement('td');
      amountTd.className = 'amount-badge' + (item.done ? ' done' : '');
      amountTd.textContent = item.amount + '×';

      const deleteTd = document.createElement('td');
      const deleteButton = document.createElement('button');
      deleteButton.className = 'delete-button';
      deleteButton.title = 'Verwijderen';
      deleteButton.textContent = '✕';
      deleteButton.addEventListener('click', () => showConfirm(index));
      deleteTd.appendChild(deleteButton);

      tr.appendChild(checkTd);
      tr.appendChild(nameTd);
      tr.appendChild(amountTd);
      tr.appendChild(deleteTd);
      return tr;
    }

    function addProduct() {
      const name = input.value.trim();
      if (!name) return;
      const amount = Math.max(1, parseInt(amountInput.value) || 1);
      items.push({ name, amount, done: false });
      save();
      render();
      input.value = '';
      amountInput.value = '1';
      input.focus();
    }

    render();
  </script>
</body>
</html>
