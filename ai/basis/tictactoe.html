<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe</title>

        <style>
            * {
                box-sizing: border-box;
            }

            :root {
                /* DEFAULT THEME (Classic Blue) */
                --bg-gradient: linear-gradient(135deg, #dfe9f3 0%, #ffffff 100%);
                --container-bg: #ffffff;
                --cell-bg: #f8f9fc;
                --cell-hover: #eef3ff;
                --x-color: #1e88e5;
                --o-color: #e53935;
                --button-bg: #1e88e5;
                --button-hover: #1565c0;
                --text-color: #333333;
            }

            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: var(--bg-gradient);
                font-family: Arial, sans-serif;

                /* NO THEME TRANSITION */
                transition: none;
            }

            .game-container {
                text-align: center;
                background: var(--container-bg);
                padding: 30px;
                border-radius: 24px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
                width: 450px;
            }

            h1 {
                margin-top: 0;
                margin-bottom: 20px;
                color: var(--text-color);
                font-size: 38px;
            }

            .theme-buttons {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }

            .theme-btn {
                padding: 10px 14px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                font-weight: bold;

                /* ONLY HOVER ANIMATION */
                transition: transform 0.15s ease;
            }

            .theme-btn:hover {
                transform: scale(1.05);
            }

            #board {
                display: grid;
                grid-template-columns: repeat(3, 120px);
                grid-template-rows: repeat(3, 120px);
                gap: 12px;
                justify-content: center;
                margin-bottom: 20px;
            }

            .cell {
                width: 120px;
                height: 120px;
                background: var(--cell-bg);
                border-radius: 18px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 72px;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
                user-select: none;

                /* ONLY HOVER ANIMATION */
                transition:
                    transform 0.15s ease,
                    box-shadow 0.15s ease;
            }

            .cell:hover {
                transform: scale(1.05);
                background: var(--cell-hover);
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            }

            .x {
                color: var(--x-color);
            }

            .o {
                color: var(--o-color);
            }

            #status {
                font-size: 24px;
                font-weight: bold;
                color: var(--text-color);
                min-height: 32px;
                margin-bottom: 18px;
            }

            .restart-btn {
                padding: 12px 24px;
                font-size: 18px;
                border: none;
                border-radius: 12px;
                background: var(--button-bg);
                color: white;
                cursor: pointer;

                /* ONLY HOVER ANIMATION */
                transition: opacity 0.15s ease;
            }

            .restart-btn:hover {
                opacity: 0.9;
            }

            .scoreboard {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }

            .score {
                padding: 12px 18px;
                border-radius: 14px;
                font-size: 20px;
                font-weight: bold;
                background: var(--cell-bg);
                color: var(--text-color);
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            }

            .player-score {
                border: 3px solid var(--x-color);
            }

            .computer-score {
                border: 3px solid var(--o-color);
            }

            .button-group {
                display: flex;
                gap: 10px;
                justify-content: center;
                flex-wrap: wrap;
            }

            .reset-score-btn {
                padding: 12px 24px;
                font-size: 18px;
                border: none;
                border-radius: 12px;
                background: var(--o-color);
                color: white;
                cursor: pointer;
                transition: opacity 0.15s ease;
            }

            .reset-score-btn:hover {
                opacity: 0.9;
            }

            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: scale(0.4);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            /* Winning highlight */
            .cell.win {
                background: gold !important;
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
                transform: scale(1.08);
            }
        </style>
    </head>
    <body>
        <div class="game-container">
            <h1>Tic Tac Toe</h1>

            <div class="theme-buttons">
                <button class="theme-btn" onclick="setTheme('classic')">Classic</button>

                <button class="theme-btn" onclick="setTheme('dark')">Dark Neon</button>

                <button class="theme-btn" onclick="setTheme('pastel')">Pastel</button>
            </div>

            <div class="scoreboard">
                <div class="score player-score">
                    🎮 Player:
                    <span id="playerScore">0</span>
                </div>

                <div class="score computer-score">
                    💻 Computer:
                    <span id="computerScore">0</span>
                </div>
            </div>

            <div id="board"></div>

            <div id="status"></div>

            <button class="restart-btn" onclick="resetGame()">Play Again</button>
        </div>

        <script>
            const boardElement = document.getElementById('board');
            const statusElement = document.getElementById('status');

            const playerScoreElement = document.getElementById('playerScore');
            const computerScoreElement = document.getElementById('computerScore');

            const themes = {
                classic: {
                    '--bg-gradient': 'linear-gradient(135deg, #dfe9f3 0%, #ffffff 100%)',
                    '--container-bg': '#ffffff',
                    '--cell-bg': '#f8f9fc',
                    '--cell-hover': '#eef3ff',
                    '--x-color': '#1e88e5',
                    '--o-color': '#e53935',
                    '--button-bg': '#1e88e5',
                    '--button-hover': '#1565c0',
                    '--text-color': '#333333',
                },

                dark: {
                    '--bg-gradient': 'linear-gradient(135deg, #141e30 0%, #243b55 100%)',
                    '--container-bg': '#1f2a38',
                    '--cell-bg': '#2b3b4d',
                    '--cell-hover': '#35495e',
                    '--x-color': '#00e5ff',
                    '--o-color': '#ff4081',
                    '--button-bg': '#00bcd4',
                    '--button-hover': '#0097a7',
                    '--text-color': '#ffffff',
                },

                pastel: {
                    '--bg-gradient': 'linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)',
                    '--container-bg': '#ffffff',
                    '--cell-bg': '#fff7fc',
                    '--cell-hover': '#f3e8ff',
                    '--x-color': '#6c63ff',
                    '--o-color': '#ff6584',
                    '--button-bg': '#6c63ff',
                    '--button-hover': '#574bdb',
                    '--text-color': '#333333',
                },
            };

            function setTheme(themeName) {
                const theme = themes[themeName];

                for (const variable in theme) {
                    document.documentElement.style.setProperty(variable, theme[variable]);
                }
            }

            let board = Array(9).fill('');
            let gameOver = false;
            let currentPlayer = Math.random() < 0.5 ? 'X' : 'O';

            let playerScore = 0;
            let computerScore = 0;

            const winningCombos = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6],
            ];

            function updateScoreboard() {
                playerScoreElement.textContent = playerScore;
                computerScoreElement.textContent = computerScore;
            }

            function createBoard(lastMoveIndex = null) {
                boardElement.innerHTML = '';

                board.forEach((cell, index) => {
                    const div = document.createElement('div');
                    div.classList.add('cell');

                    if (cell === 'X') div.classList.add('x');
                    if (cell === 'O') div.classList.add('o');

                    div.textContent = cell;

                    // ONLY animate the last played move
                    if (index === lastMoveIndex && cell !== '') {
                        div.style.animation = 'popIn 0.2s ease';
                    }

                    div.addEventListener('click', () => playerMove(index));

                    boardElement.appendChild(div);
                });
            }

            function startGame() {
                createBoard();

                if (currentPlayer === 'X') {
                    statusElement.textContent = '🎮 You start!';
                } else {
                    statusElement.textContent = '💻 Computer starts!';
                    setTimeout(computerMove, 500);
                }
            }

            /* WIN DETECTION WITH HIGHLIGHT */
            function highlightWin(combo) {
                const cells = document.querySelectorAll('.cell');
                combo.forEach(i => {
                    cells[i].classList.add('win');
                });
            }

            /* CONFETTI */
            function launchConfetti() {
                // Launch from center area
                const centerX = window.innerWidth / 2;

                for (let i = 0; i < 160; i++) {
                    const confetti = document.createElement('div');

                    confetti.style.position = 'fixed';

                    // Spawn around center
                    const spawnOffset = (Math.random() - 0.5) * 300;

                    let x = centerX + spawnOffset;

                    let y = window.innerHeight / 2 - 100;

                    confetti.style.left = x + 'px';
                    confetti.style.top = y + 'px';

                    // Random size
                    const size = 6 + Math.random() * 10;

                    confetti.style.width = size + 'px';
                    confetti.style.height = size + 'px';

                    // Random color
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;

                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

                    confetti.style.pointerEvents = 'none';

                    confetti.style.zIndex = 9999;

                    document.body.appendChild(confetti);

                    // Explosion force
                    let velocityX = (Math.random() - 0.5) * 14;

                    let velocityY = -(Math.random() * 12 + 6);

                    // Gravity
                    const gravity = 0.35;

                    // Air resistance
                    const friction = 0.99;

                    // Rotation
                    let rotation = Math.random() * 360;

                    const rotationSpeed = (Math.random() - 0.5) * 20;

                    function update() {
                        velocityY += gravity;

                        velocityX *= friction;

                        x += velocityX;

                        y += velocityY;

                        rotation += rotationSpeed;

                        confetti.style.left = x + 'px';

                        confetti.style.top = y + 'px';

                        confetti.style.transform = `rotate(${rotation}deg)`;

                        // Fade out slightly near end
                        if (y > window.innerHeight * 0.7) {
                            confetti.style.opacity = Math.max(
                                0,
                                1 - (y - window.innerHeight * 0.7) / (window.innerHeight * 0.3),
                            );
                        }

                        // Cleanup
                        if (y > window.innerHeight + 50) {
                            confetti.remove();
                            return;
                        }

                        requestAnimationFrame(update);
                    }

                    requestAnimationFrame(update);
                }
            }

            function playerMove(index) {
                if (gameOver || currentPlayer !== 'X' || board[index] !== '') return;

                board[index] = 'X';
                createBoard(index);

                const winCombo = getWinningCombo('X');

                if (winCombo) {
                    playerScore++;
                    updateScoreboard();
                    statusElement.textContent = '🎉 You Win!';
                    gameOver = true;

                    highlightWin(winCombo);
                    launchConfetti();
                    return;
                }

                if (isDraw()) {
                    statusElement.textContent = '🤝 Draw';
                    gameOver = true;
                    return;
                }

                currentPlayer = 'O';
                setTimeout(computerMove, 500);
            }

            function computerMove() {
                if (gameOver || currentPlayer !== 'O') return;

                const emptyCells = board.map((v, i) => (v === '' ? i : null)).filter(v => v !== null);

                let move = null;

                // win
                for (let i of emptyCells) {
                    board[i] = 'O';
                    if (checkWinner('O')) {
                        move = i;
                        board[i] = '';
                        break;
                    }
                    board[i] = '';
                }

                // block
                if (!move) {
                    for (let i of emptyCells) {
                        board[i] = 'X';
                        if (checkWinner('X')) {
                            move = i;
                            board[i] = '';
                            break;
                        }
                        board[i] = '';
                    }
                }

                // random
                if (!move) {
                    move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                }

                board[move] = 'O';
                createBoard(move);

                const winCombo = getWinningCombo('O');

                if (winCombo) {
                    computerScore++;
                    updateScoreboard();
                    statusElement.textContent = '💻 Computer Wins!';
                    gameOver = true;

                    highlightWin(winCombo);
                    return;
                }

                if (isDraw()) {
                    statusElement.textContent = '🤝 Draw';
                    gameOver = true;
                    return;
                }

                currentPlayer = 'X';
            }

            function getWinningCombo(player) {
                return winningCombos.find(combo => combo.every(i => board[i] === player));
            }

            function checkWinner(player) {
                return getWinningCombo(player) !== undefined;
            }

            function isDraw() {
                return board.every(cell => cell !== '');
            }

            function resetGame() {
                board = Array(9).fill('');
                gameOver = false;
                currentPlayer = Math.random() < 0.5 ? 'X' : 'O';
                startGame();
            }

            function resetScore() {
                playerScore = 0;
                computerScore = 0;
                updateScoreboard();
            }

            updateScoreboard();
            startGame();
        </script>
    </body>
</html>
